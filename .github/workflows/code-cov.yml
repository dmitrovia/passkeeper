name: test-and-coverage

on: 
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
      - dev

jobs:
  build:
     runs-on: ubuntu-latest
     steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-go@v5
          with:
            go-version: 1.23
        - name: Run coverage
          run: |
            go env -w CGO_ENABLED=0
            go run generate/generate.go
            mv generate/public.pem internal/client/crypto/keys
            mv generate/private.pem internal/server/crypto/keys
            go run generate/generate.go
            mv generate/private.pem internal/client/crypto/keys
            mv generate/public.pem internal/server/crypto/keys
            go test -v -coverprofile coverage.out -coverpkg= ./test/... ./internal/...
            go tool cover -html coverage.out -o coverage.html
        - name: Upload coverage to Codecov
          uses: codecov/codecov-action@v5
          with:
            token: ${{ secrets.CODECOV_TOKEN }}
            files: ./coverage.out
            flags: unittests
            name: codecov-umbrella
        - name: Archive code coverage results
          uses: actions/upload-artifact@v4
          with:
            name: code-coverage-report
            path: coverage.html