services:
  go_db:
    container_name: go_db
    build:
      context: .
      dockerfile: Dockerfile1
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "praktikum"
    ports:
      - "5432:5432"
    volumes:
      - data_sql:/var/lib/postgresql/data
    #networks:
    #  - fullstack

  server:
      container_name: server
      build:
        context: .
        dockerfile: Dockerfile
      environment:
        DATABASE_URL: "postgres://postgres:postgres@localhost:5432/praktikum?sslmode=disable"
      ports:
        - "8443:8443"
      network_mode: "host"
      restart: always
      depends_on:
        - go_db
      #networks:
      #  - fullstack
volumes:
  data_sql:

